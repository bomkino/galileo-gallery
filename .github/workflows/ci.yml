name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test

  package-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run package:linux
      - name: Export from the packaged AppImage
        run: xvfb-run -a env REEL_SMOKE_OUTPUT=./release/ci-smoke.mp4 release/*-Linux-x86_64.AppImage --appimage-extract-and-run --no-sandbox
      - run: node -e "if (require('fs').statSync('release/ci-smoke.mp4').size < 1000) process.exit(1)"
      - uses: actions/upload-artifact@v6
        with:
          name: galileo-gallery-linux
          path: release/*.AppImage

  package-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run package:windows
      - name: Export from the packaged Windows app
        shell: pwsh
        run: |
          $env:REEL_SMOKE_OUTPUT = "$pwd\release\ci-smoke.mp4"
          $env:REEL_USER_DATA_DIR = "$env:RUNNER_TEMP\galileo-gallery-smoke"
          & "release\win-unpacked\Galileo Gallery.exe"
      - run: node -e "if (require('fs').statSync('release/ci-smoke.mp4').size < 1000) process.exit(1)"
      - uses: actions/upload-artifact@v6
        with:
          name: galileo-gallery-windows
          path: release/*.exe
